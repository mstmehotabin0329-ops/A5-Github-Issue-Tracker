<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- daisyUI and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">


</head>

<body class="bg-gray-200 min-h-screen flex justify-center items-center">
    <section class="bg-white shadow-lg w-[520px] rounded-lg p-8">
        <div class="space-y-5 mb-6">
            <div class="flex justify-center">
                <img src="assets/github-logo.png" alt="">
            </div>
            <div class="text-center">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>

        </div>


        <div class="mb-6">


            <label class="font-medium">Username</label> <br>
            <input id="input-username" type="text" maxlength="5" class="input w-full p-4" placeholder="Enter Username" />
            <p class="text-purple-600">Default: admin</p>
            <br>


            <label class="font-medium">Password</label> <br>
            <input id="password-input" type="password" maxlength="8" class="input w-full p-4" placeholder="Enter Password" />
            
            <p class="text-purple-600">Default: admin123</p>
            <br>

            <button id="signInBtn"
             class="btn btn-primary mt-4 w-full">Sign In</button>
        </div>
         <div class="grid grid-cols-13">
            <hr class="col-span-6 text-gray-300 mt-3">
            <p class="text-center mb-4 col-span-1">OR</p> 
            <hr class="col-span-6 text-gray-300 mt-3">
         </div>

        <div class="text-center space-y-2">
            <h2 class="text-[#64748B]">Demo Credentials:</h2>
            <div class="bg-gray-100 rounded-lg p-6">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
                    
            </div>
        </div>





    </section>

    

    <script src="js/login.js"></script>
</body>

</html>
